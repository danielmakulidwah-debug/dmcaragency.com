<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --ink:#0a0a0a; --ink2:#111; --ink3:#1c1c1c; --ink4:#242424;
  --fog:#555; --mist:#888; --linen:#f0ede8; --white:#fff;
  --flame:#e8491d; --flame2:#ff5a30;
  --gold:#c8973a; --gold2:#f0c060;
  --green:#27ae60; --green2:#2ecc71;
  --wa:#25D366; --wa2:#1ebe5d;
  --fd:'Playfair Display',Georgia,serif;
  --fh:'Oswald',sans-serif;
  --fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --r:6px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--ink);color:var(--linen);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--flame);border-radius:2px}

/* ── ATMOSPHERE ── */
.atm{position:fixed;inset:0;pointer-events:none;z-index:0}
.atm-g1{position:absolute;width:70vw;height:70vw;border-radius:50%;
  background:radial-gradient(circle,rgba(39,174,96,.07) 0%,transparent 65%);
  top:-25%;right:-20%;animation:dA 20s ease-in-out infinite alternate}
.atm-g2{position:absolute;width:55vw;height:55vw;border-radius:50%;
  background:radial-gradient(circle,rgba(232,73,29,.05) 0%,transparent 65%);
  bottom:-15%;left:-15%;animation:dB 24s ease-in-out infinite alternate}
.atm-g3{position:absolute;width:40vw;height:40vw;border-radius:50%;
  background:radial-gradient(circle,rgba(200,151,58,.04) 0%,transparent 65%);
  top:40%;left:30%;animation:dA 18s ease-in-out infinite alternate}
@keyframes dA{to{transform:translate(-4%,6%) scale(1.08)}}
@keyframes dB{to{transform:translate(4%,-4%) scale(0.94)}}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.96);
  backdrop-filter:blur(20px);border-bottom:1px solid rgba(240,237,232,.06);
  padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;
  height:68px;transition:box-shadow .3s}
.hdr.scrolled{box-shadow:0 4px 40px rgba(0,0,0,.6)}
.logo{font-family:var(--fh);font-size:1.3rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--white);text-decoration:none}
.logo span{color:var(--flame)}
.hlinks{display:flex;align-items:center;gap:.75rem}
.hbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;
  font-family:var(--fh);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;
  border-radius:var(--r);text-decoration:none;font-weight:600;transition:all .25s;
  color:var(--linen);border:1px solid rgba(240,237,232,.15)}
.hbtn:hover{border-color:var(--flame);color:var(--flame)}
.hbtn.wa{border-color:rgba(37,211,102,.25);color:var(--wa)}
.hbtn.wa:hover{border-color:var(--wa);background:rgba(37,211,102,.07)}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 2.5rem 6rem}

/* ── HERO / WELCOME ── */
.welcome{
  text-align:center;padding:5rem 1rem 4.5rem;
  border-bottom:1px solid rgba(240,237,232,.06);
  margin-bottom:5rem;position:relative;
}
.confetti-row{
  display:flex;justify-content:center;align-items:center;
  gap:1.5rem;margin-bottom:2rem;
  animation:popIn .7s var(--ease) both;
}
.confetti-row span{font-size:1.8rem;animation:wobble 3s ease-in-out infinite}
.confetti-row span:nth-child(2){animation-delay:.15s;font-size:2.4rem}
.confetti-row span:nth-child(3){animation-delay:.3s}
@keyframes wobble{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

.badge-approved{
  display:inline-flex;align-items:center;gap:8px;
  padding:.45rem 1.25rem;margin-bottom:1.5rem;
  background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);
  border-radius:2px;font-family:var(--fh);font-size:.65rem;
  letter-spacing:4px;text-transform:uppercase;color:var(--green);
  animation:popIn .6s var(--ease) .1s both;
}
.badge-approved i{font-size:.8rem}

.w-title{
  font-family:var(--fd);font-size:clamp(2.8rem,6vw,4.5rem);
  font-weight:900;line-height:1.05;color:var(--white);
  margin-bottom:1rem;
  animation:slideUp .7s var(--ease) .2s both;
}
.w-title em{font-style:italic;color:var(--green)}
.w-sub{
  color:var(--mist);font-size:1.05rem;line-height:1.8;
  max-width:560px;margin:0 auto 3rem;
  animation:slideUp .7s var(--ease) .3s both;
}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── STATS ROW ── */
.stats-row{
  display:flex;justify-content:center;gap:0;
  background:rgba(240,237,232,.03);border:1px solid rgba(240,237,232,.06);
  border-radius:var(--r);overflow:hidden;
  max-width:640px;margin:0 auto;
  animation:slideUp .7s var(--ease) .4s both;
}
.stat{flex:1;padding:1.5rem 1rem;text-align:center;position:relative}
.stat:not(:last-child)::after{content:'';position:absolute;right:0;top:25%;
  height:50%;width:1px;background:rgba(240,237,232,.06)}
.stat-num{font-family:var(--fh);font-size:1.9rem;font-weight:700;
  color:var(--white);line-height:1}
.stat-num span{color:var(--flame)}
.stat-lbl{font-size:.7rem;color:var(--fog);letter-spacing:1px;margin-top:5px}

/* ── SECTION BASE ── */
.sec{margin-bottom:5rem}
.sec-kicker{font-family:var(--fh);font-size:.6rem;letter-spacing:5px;
  text-transform:uppercase;color:var(--flame);
  display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.sec-kicker span{width:24px;height:1px;background:var(--flame)}
.sec-title{font-family:var(--fd);font-size:clamp(1.8rem,3.5vw,2.6rem);
  font-weight:700;color:var(--white);margin-bottom:.5rem}
.sec-desc{color:var(--mist);font-size:.95rem;line-height:1.75;
  max-width:560px;margin-bottom:3rem}

/* ── HOW IT WORKS ── */
.steps-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:rgba(240,237,232,.04);border-radius:var(--r);overflow:hidden;
  border:1px solid rgba(240,237,232,.06);
}
.step-card{
  background:var(--ink2);padding:2rem 1.5rem;
  position:relative;transition:background .25s;
  animation:slideUp .6s var(--ease) both;
}
.step-card:nth-child(1){animation-delay:.05s}
.step-card:nth-child(2){animation-delay:.1s}
.step-card:nth-child(3){animation-delay:.15s}
.step-card:nth-child(4){animation-delay:.2s}
.step-card:hover{background:var(--ink3)}
.step-num-badge{
  position:absolute;top:1.25rem;right:1.25rem;
  font-family:var(--fh);font-size:3rem;font-weight:700;
  color:rgba(240,237,232,.04);line-height:1;user-select:none;
}
.step-icon{
  width:48px;height:48px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;margin-bottom:1.25rem;
}
.step-icon.c1{background:rgba(232,73,29,.12);color:var(--flame)}
.step-icon.c2{background:rgba(200,151,58,.12);color:var(--gold)}
.step-icon.c3{background:rgba(37,211,102,.12);color:var(--wa)}
.step-icon.c4{background:rgba(39,174,96,.12);color:var(--green)}
.step-card h3{font-family:var(--fh);font-size:.75rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--white);margin-bottom:.6rem}
.step-card p{color:var(--fog);font-size:.82rem;line-height:1.65}

/* ── WHATSAPP SECTION ── */
.wa-section{
  background:var(--ink3);border:1px solid rgba(37,211,102,.12);
  border-radius:var(--r);overflow:hidden;position:relative;
}
.wa-section::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(37,211,102,.05),transparent);
  pointer-events:none}
.wa-inner{
  display:grid;grid-template-columns:1fr 1fr;gap:4rem;
  align-items:center;padding:4rem;position:relative;z-index:1;
}
.wa-left{}
.wa-big-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(37,211,102,.1);border:2px solid rgba(37,211,102,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:var(--wa);margin-bottom:1.5rem;
  animation:waPulse 3s ease-in-out infinite;
}
@keyframes waPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.25)}60%{box-shadow:0 0 0 14px rgba(37,211,102,0)}}
.wa-title{font-family:var(--fd);font-size:2rem;font-weight:700;
  color:var(--white);margin-bottom:.75rem}
.wa-desc{color:var(--mist);font-size:.92rem;line-height:1.75;margin-bottom:2rem}
.wa-link-box{
  display:flex;align-items:center;gap:.75rem;
  padding:.9rem 1.1rem;background:var(--ink2);
  border:1px solid rgba(37,211,102,.2);border-radius:var(--r);
  margin-bottom:1.5rem;
}
.wa-link-box i{color:var(--wa);font-size:.9rem;flex-shrink:0}
.wa-link-text{font-size:.8rem;color:var(--mist);word-break:break-all;flex:1}
.wa-link-copy{
  padding:.4rem .75rem;background:rgba(37,211,102,.1);
  color:var(--wa);border:1px solid rgba(37,211,102,.2);
  border-radius:4px;font-family:var(--fh);font-size:.58rem;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;flex-shrink:0;
}
.wa-link-copy:hover{background:rgba(37,211,102,.2)}
.wa-link-copy.copied{color:var(--green);border-color:rgba(39,174,96,.3)}

.btn-join-group{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:1.1rem;
  background:var(--wa);color:#fff;
  border:none;border-radius:var(--r);text-decoration:none;
  font-family:var(--fh);font-size:.82rem;letter-spacing:3px;text-transform:uppercase;
  font-weight:600;transition:all .3s;
  box-shadow:0 8px 32px rgba(37,211,102,.25);
}
.btn-join-group:hover{background:var(--wa2);transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(37,211,102,.35)}

/* right side — benefits */
.wa-right{}
.wa-benefits{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem}
.wa-ben{
  display:flex;align-items:flex-start;gap:1rem;
  padding:1rem 1.25rem;background:var(--ink2);
  border:1px solid rgba(240,237,232,.05);border-radius:var(--r);
  transition:border-color .2s;
}
.wa-ben:hover{border-color:rgba(37,211,102,.2)}
.wa-ben-ico{
  width:36px;height:36px;flex-shrink:0;border-radius:4px;
  background:rgba(37,211,102,.1);color:var(--wa);
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
}
.wa-ben h4{font-family:var(--fh);font-size:.65rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--white);margin-bottom:3px}
.wa-ben p{color:var(--fog);font-size:.78rem;line-height:1.5}

/* ── CHAT WITH US (admin notification CTA) ── */
.notify-strip{
  background:var(--ink3);
  border:1px solid rgba(232,73,29,.15);
  border-radius:var(--r);
  padding:2.5rem 3rem;
  display:flex;align-items:center;gap:2.5rem;
  position:relative;overflow:hidden;
  margin-top:1.5rem;
}
.notify-strip::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 100% at 0% 50%,rgba(232,73,29,.05),transparent);
  pointer-events:none}
.notify-icon-wrap{
  width:60px;height:60px;flex-shrink:0;border-radius:50%;
  background:rgba(232,73,29,.1);border:1px solid rgba(232,73,29,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:var(--flame);
}
.notify-text{flex:1;position:relative;z-index:1}
.notify-text h3{font-family:var(--fh);font-size:.8rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--white);margin-bottom:.4rem}
.notify-text p{color:var(--fog);font-size:.875rem;line-height:1.65}
.notify-text p strong{color:var(--linen)}
.btn-notify{
  display:inline-flex;align-items:center;gap:8px;flex-shrink:0;
  padding:.9rem 1.75rem;
  background:rgba(37,211,102,.08);
  border:1px solid rgba(37,211,102,.3);
  color:var(--wa);border-radius:var(--r);text-decoration:none;
  font-family:var(--fh);font-size:.72rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:600;transition:all .25s;white-space:nowrap;
}
.btn-notify:hover{background:rgba(37,211,102,.15);transform:translateY(-2px)}

/* ── EARNINGS ── */
.earn-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1px;
  background:rgba(240,237,232,.04);border-radius:var(--r);overflow:hidden;
  border:1px solid rgba(240,237,232,.06);
}
.earn-card{background:var(--ink2);padding:2rem 1.75rem;transition:background .25s}
.earn-card:hover{background:var(--ink3)}
.earn-icon{width:44px;height:44px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;margin-bottom:1.25rem}
.earn-icon.c1{background:rgba(200,151,58,.12);color:var(--gold)}
.earn-icon.c2{background:rgba(232,73,29,.12);color:var(--flame)}
.earn-icon.c3{background:rgba(39,174,96,.12);color:var(--green)}
.earn-icon.c4{background:rgba(37,211,102,.12);color:var(--wa)}
.earn-card h3{font-family:var(--fh);font-size:.72rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--white);margin-bottom:.6rem}
.earn-card p{color:var(--fog);font-size:.85rem;line-height:1.65}
.earn-highlight{
  display:inline-block;margin-top:.75rem;padding:.3rem .75rem;
  background:rgba(200,151,58,.1);border:1px solid rgba(200,151,58,.2);
  border-radius:2px;font-family:var(--fh);font-size:.72rem;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);
}

/* ── NEXT STEPS ── */
.next-steps-list{display:flex;flex-direction:column;gap:1px;
  background:rgba(240,237,232,.04);border-radius:var(--r);overflow:hidden;
  border:1px solid rgba(240,237,232,.06)}
.ns-item{
  background:var(--ink2);padding:1.75rem 2rem;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:1.5rem;transition:background .25s;
}
.ns-item:hover{background:var(--ink3)}
.ns-num{
  width:36px;height:36px;flex-shrink:0;border-radius:50%;
  background:rgba(232,73,29,.1);border:1px solid rgba(232,73,29,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:.85rem;color:var(--flame);font-weight:600;
}
.ns-body h4{font-family:var(--fh);font-size:.72rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--white);margin-bottom:4px}
.ns-body p{color:var(--fog);font-size:.82rem;line-height:1.6}
.ns-tag{
  padding:.3rem .85rem;border-radius:2px;
  font-family:var(--fh);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
}
.ns-tag.now{background:rgba(232,73,29,.12);color:var(--flame);border:1px solid rgba(232,73,29,.2)}
.ns-tag.soon{background:rgba(200,151,58,.08);color:var(--gold);border:1px solid rgba(200,151,58,.15)}
.ns-tag.ongoing{background:rgba(39,174,96,.08);color:var(--green);border:1px solid rgba(39,174,96,.15)}

/* ── FINAL CTA BAND ── */
.cta-band{
  position:relative;overflow:hidden;
  background:var(--ink3);border:1px solid rgba(240,237,232,.06);
  border-radius:var(--r);padding:5rem 3rem;text-align:center;
  margin-top:5rem;
}
.cta-band::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(37,211,102,.06),transparent);
  pointer-events:none}
.cta-band-kicker{font-family:var(--fh);font-size:.62rem;letter-spacing:5px;
  text-transform:uppercase;color:var(--wa);margin-bottom:.75rem;
  display:flex;align-items:center;justify-content:center;gap:10px}
.cta-band-kicker span{width:24px;height:1px;background:var(--wa)}
.cta-band h2{font-family:var(--fd);font-size:clamp(2rem,4vw,3rem);
  font-weight:700;color:var(--white);margin-bottom:.75rem;position:relative}
.cta-band p{color:var(--mist);font-size:.95rem;line-height:1.75;
  max-width:480px;margin:0 auto 2.5rem;position:relative}
.cta-btns{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.btn-cta-primary{
  display:inline-flex;align-items:center;gap:9px;
  padding:1.1rem 2.5rem;
  background:var(--wa);color:#fff;border-radius:var(--r);
  text-decoration:none;font-family:var(--fh);font-size:.8rem;
  letter-spacing:3px;text-transform:uppercase;font-weight:600;
  transition:all .3s;box-shadow:0 8px 32px rgba(37,211,102,.3);
  position:relative;
}
.btn-cta-primary:hover{background:var(--wa2);transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(37,211,102,.4)}
.btn-cta-secondary{
  display:inline-flex;align-items:center;gap:9px;
  padding:1.1rem 2rem;
  background:transparent;color:var(--linen);
  border:1px solid rgba(240,237,232,.2);border-radius:var(--r);
  text-decoration:none;font-family:var(--fh);font-size:.8rem;
  letter-spacing:3px;text-transform:uppercase;font-weight:600;
  transition:all .3s;
}
.btn-cta-secondary:hover{border-color:var(--flame);color:var(--flame)}

/* ── FOOTER ── */
footer{
  position:relative;z-index:1;
  border-top:1px solid rgba(240,237,232,.06);
  padding:2.5rem;text-align:center;
  color:var(--fog);font-size:.8rem;line-height:1.8;
}
footer a{color:var(--flame);text-decoration:none}
footer a:hover{text-decoration:underline}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--ink3);border:1px solid rgba(39,174,96,.3);
  color:var(--linen);padding:11px 22px;border-radius:var(--r);
  font-size:.85rem;opacity:0;visibility:hidden;
  transition:all .3s var(--ease);z-index:4000;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.toast i{color:var(--green)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){

}

  .hdr{padding:0 1.25rem}
