<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse our full inventory of quality vehicles — DM Car Agency Malawi">
<title>Browse Cars — DM Car Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --ink:#0a0a0a;--ink2:#111;--ink3:#1c1c1c;--ink4:#242424;
  --smoke:#2e2e2e;--fog:#555;--mist:#888;--linen:#f0ede8;--white:#fff;
  --flame:#e8491d;--flame2:#ff5a30;--gold:#c8973a;--gold2:#f0c060;
  --green:#27ae60;--wa:#25D366;
  --fd:'Playfair Display',Georgia,serif;
  --fh:'Oswald',sans-serif;
  --fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --r:6px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--ink);color:var(--linen);min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--flame);border-radius:2px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.96);
  backdrop-filter:blur(20px);border-bottom:1px solid rgba(240,237,232,.06);
  padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;
  height:68px;transition:box-shadow .3s}
.hdr.scrolled{box-shadow:0 4px 40px rgba(0,0,0,.5)}
.logo{font-family:var(--fh);font-size:1.3rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--white);text-decoration:none}
.logo span{color:var(--flame)}
.hnav{display:flex;align-items:center;gap:.75rem}
.nbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;
  font-family:var(--fh);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;
  border-radius:var(--r);text-decoration:none;font-weight:600;transition:all .25s;
  cursor:pointer;border:none}
.nf{background:var(--flame);color:#fff}.nf:hover{background:var(--flame2);transform:translateY(-1px)}
.ng{background:transparent;color:var(--linen);border:1px solid rgba(240,237,232,.2)}
.ng:hover{border-color:var(--flame);color:var(--flame)}

/* HERO */
.hero{padding:3rem 2.5rem 2rem;border-bottom:1px solid rgba(240,237,232,.06);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 100% at 80% 50%,rgba(232,73,29,.06),transparent)}
.hero-in{max-width:1440px;margin:0 auto;position:relative}
.kicker{font-family:var(--fh);font-size:.65rem;letter-spacing:5px;text-transform:uppercase;
  color:var(--flame);display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
.kicker span{width:28px;height:1px;background:var(--flame)}
.htitle{font-family:var(--fd);font-size:clamp(2rem,4vw,3rem);font-weight:900;
  line-height:1.05;color:var(--white);margin-bottom:1.25rem}
.htitle em{font-style:italic;color:rgba(240,237,232,.3)}
.cbadge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;
  border:1px solid rgba(232,73,29,.35);border-radius:2px;font-family:var(--fh);
  font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--flame)}

/* CONTROLS */
.ctrl-bar{background:var(--ink2);border-bottom:1px solid rgba(240,237,232,.06);padding:0 2.5rem}
.ctrl-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;
  justify-content:space-between;gap:1rem;padding:.9rem 0;flex-wrap:wrap}
.sort-grp{display:flex;align-items:center;gap:10px;font-family:var(--fh);
  font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--mist)}
.sort-sel{background:var(--ink3);border:1px solid rgba(240,237,232,.1);color:var(--linen);
  padding:8px 14px;border-radius:var(--r);font-family:var(--fb);font-size:.875rem;
  cursor:pointer;transition:border-color .2s;min-width:190px}
.sort-sel:focus{outline:none;border-color:var(--flame)}
.sort-sel option{background:var(--ink3)}
.ftog{display:flex;align-items:center;gap:7px;padding:8px 16px;
  background:transparent;border:1px solid rgba(240,237,232,.12);color:var(--linen);
  border-radius:var(--r);font-family:var(--fh);font-size:.7rem;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:all .2s}
.ftog:hover,.ftog.on{border-color:var(--flame);color:var(--flame)}
.fdot{width:6px;height:6px;border-radius:50%;background:var(--flame);display:none}
.fdot.show{display:block}

/* FILTER PANEL */
.fpanel{background:var(--ink2);border-bottom:1px solid rgba(240,237,232,.06);
  max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.fpanel.open{max-height:600px}
.fp-in{max-width:1440px;margin:0 auto;padding:1.5rem 2.5rem 2rem}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.flabel{font-family:var(--fh);font-size:.65rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--mist);margin-bottom:5px;display:block}
.finput{background:var(--ink3);border:1px solid rgba(240,237,232,.1);color:var(--linen);
  padding:9px 12px;border-radius:var(--r);font-family:var(--fb);font-size:.875rem;
  transition:border-color .2s;width:100%}
.finput:focus{outline:none;border-color:var(--flame)}
.finput option{background:var(--ink3)}
.fact{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.25rem}
.breset{padding:9px 20px;background:var(--smoke);color:var(--linen);border:none;
  border-radius:var(--r);font-family:var(--fh);font-size:.7rem;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:background .2s}
.breset:hover{background:var(--fog)}

/* MAIN */
.wrap{max-width:1440px;margin:0 auto;padding:2.5rem 2.5rem 4rem}

/* GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.5rem}

/* CARD */
.ccard{background:var(--ink3);border:1px solid rgba(240,237,232,.05);border-radius:var(--r);
  overflow:hidden;transition:transform .35s var(--ease),box-shadow .35s,border-color .35s;
  position:relative;animation:cin .4s var(--ease) both}
@keyframes cin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ccard:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.5);
  border-color:rgba(232,73,29,.25)}

/* Card image */
.cimg{position:relative;height:230px;overflow:hidden;
  background:linear-gradient(135deg,#130803,#1e0e06);cursor:pointer}
.cimg img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .6s var(--ease)}
.ccard:hover .cimg img{transform:scale(1.06)}
.noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;color:rgba(232,73,29,.12)}
.covlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.7),transparent 50%);
  opacity:0;transition:opacity .3s}
.ccard:hover .covlay{opacity:1}
.imgcnt{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;
  padding:4px 10px;border-radius:20px;font-size:.75rem;display:flex;align-items:center;gap:5px}

/* Badges */
.cbadges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;z-index:2}
.badge{padding:5px 11px;border-radius:2px;font-family:var(--fh);font-size:.6rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.bfeat{background:var(--gold);color:#1a1000}
.bnew{background:#1a7a3a;color:#a8ffca}
.bhot{background:var(--flame);color:#fff;animation:hp 2s infinite}
@keyframes hp{0%,100%{opacity:1}50%{opacity:.75}}

/* Share btn */
.sbtn{position:absolute;top:10px;right:10px;width:36px;height:36px;
  background:rgba(255,255,255,.9);border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:3}
.sbtn:hover{background:#fff;transform:scale(1.12)}
.sbtn i{color:var(--ink2);font-size:1rem}

/* Card body */
.cbody{padding:1.5rem}
.cmake{font-family:var(--fh);font-size:.6rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--flame);margin-bottom:4px}
.cname{font-family:var(--fd);font-size:1.25rem;font-weight:700;color:var(--white);
  line-height:1.1;margin-bottom:.5rem}
.cprice{font-family:var(--fh);font-size:1.3rem;font-weight:700;color:var(--gold2);
  letter-spacing:1px;margin-bottom:1rem}
.cspecs{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.spec{display:flex;align-items:center;gap:7px;color:var(--mist);font-size:.82rem}
.spec i{color:var(--flame);width:14px;font-size:.75rem}
.cdesc{color:var(--fog);font-size:.85rem;line-height:1.6;margin-bottom:.75rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cstats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;
  padding-bottom:1rem;border-bottom:1px solid rgba(240,237,232,.06)}
.spill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  background:var(--ink2);border-radius:20px;font-size:.78rem;color:var(--mist)}
.spill strong{color:var(--linen)}
.spill.lkd strong{color:var(--flame)}
.cloc{display:flex;align-items:center;gap:7px;color:var(--fog);font-size:.82rem;margin-bottom:1.1rem}
.cloc i{color:var(--flame)}
.cacts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.abtn{padding:10px 6px;border:none;border-radius:var(--r);font-family:var(--fh);
  font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  transition:all .25s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:600}
.ad{background:var(--ink4);color:var(--linen);border:1px solid rgba(240,237,232,.1)}
.ad:hover{background:var(--smoke);border-color:var(--flame);color:var(--flame)}
.af{background:var(--flame);color:#fff}.af:hover{background:var(--flame2);transform:translateY(-1px)}
.aw{background:var(--wa);color:#fff}.aw:hover{background:#1faa52;transform:translateY(-1px)}
.abtn.lkd{background:rgba(232,73,29,.15);color:var(--flame);border-color:rgba(232,73,29,.3)}

/* EMPTY */
.empty{text-align:center;padding:5rem 2rem;grid-column:1/-1}
.empty i{font-size:5rem;color:rgba(240,237,232,.06);margin-bottom:1.5rem;display:block}
.empty h2{font-family:var(--fd);font-size:2rem;color:var(--white);margin-bottom:.75rem}
.empty p{color:var(--fog);margin-bottom:2rem}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;
  overflow-y:auto;padding:20px;backdrop-filter:blur(6px)}
.mbg.open{display:flex;align-items:flex-start;justify-content:center}
.mbox{background:var(--ink3);border:1px solid rgba(240,237,232,.08);border-radius:var(--r);
  max-width:900px;width:100%;position:relative;overflow:hidden;margin:auto;
  animation:min .35s var(--ease)}
@keyframes min{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mgallery{position:relative;height:400px;background:#000;overflow:hidden}
.mimg{width:100%;height:100%;object-fit:contain;display:none}
.mimg.on{display:block}
.mnoimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:6rem;color:rgba(232,73,29,.1);background:linear-gradient(135deg,#130803,#1e0e06)}
.gnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.7);
  color:#fff;border:none;width:46px;height:46px;border-radius:50%;cursor:pointer;
  font-size:1.2rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2}
.gnav:hover{background:rgba(232,73,29,.8);transform:translateY(-50%) scale(1.1)}
.gnav.prev{left:16px}.gnav.next{right:16px}
.gdots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;z-index:2}
.gdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);
  cursor:pointer;transition:all .2s}
.gdot.on{background:var(--flame);transform:scale(1.3)}
.gctr{position:absolute;top:14px;left:16px;background:rgba(0,0,0,.7);color:#fff;
  padding:5px 12px;border-radius:20px;font-size:.8rem;z-index:2}
.mclose{position:absolute;top:14px;right:14px;width:38px;height:38px;
  background:var(--flame);color:#fff;border:none;border-radius:50%;font-size:1.1rem;
  cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;transition:background .2s}
.mclose:hover{background:var(--flame2)}
.mbw{padding:2rem}
.mmake{font-family:var(--fh);font-size:.65rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--flame);margin-bottom:6px}
.mtitle{font-family:var(--fd);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:900;
  color:var(--white);margin-bottom:.5rem}
.mprice{font-family:var(--fh);font-size:2rem;font-weight:700;color:var(--gold2);margin-bottom:1.5rem}
.mstats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem}
.mstat{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;
  background:var(--ink2);border-radius:20px;font-size:.85rem;color:var(--mist)}
.mstat strong{color:var(--linen)}
.mactrow{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.75rem}
.mact{padding:11px 20px;border-radius:var(--r);font-family:var(--fh);font-size:.7rem;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .25s;
  display:inline-flex;align-items:center;gap:7px;font-weight:600;border:none}
.ma-f{background:var(--flame);color:#fff}.ma-f:hover{background:var(--flame2)}
.ma-g{background:var(--ink4);color:var(--linen);border:1px solid rgba(240,237,232,.1)}
.ma-g:hover{border-color:var(--flame);color:var(--flame)}
.ma-w{background:var(--wa);color:#fff}.ma-w:hover{background:#1faa52}
.mact.lkd{background:rgba(232,73,29,.15);color:var(--flame);border:1px solid rgba(232,73,29,.3)}
.mdetails{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.drow{display:flex;align-items:flex-start;gap:12px}
.dicon{color:var(--flame);font-size:1.25rem;width:24px;margin-top:2px;flex-shrink:0}
.dinfo h4{font-family:var(--fh);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--fog);margin-bottom:3px}
.dinfo p{color:var(--white);font-size:1rem;font-weight:600}
.mdesc{background:var(--ink2);padding:1.5rem;border-radius:var(--r);
  margin-bottom:1.5rem;border-left:2px solid var(--flame)}
.mdesc h3{font-family:var(--fh);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--flame);margin-bottom:.75rem}
.mdesc p{color:var(--mist);line-height:1.8}
.mloc{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;
  background:var(--ink2);border-radius:var(--r);margin-bottom:1.5rem}
.mloc i{color:var(--flame);font-size:1.3rem}
.mloc h4{font-family:var(--fh);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--fog)}
.mloc p{color:var(--white);font-weight:600}
.mcont{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:2rem}

/* Comments */
.csect{border-top:1px solid rgba(240,237,232,.08);padding-top:1.75rem}
.ctitle{font-family:var(--fh);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--white);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.ctitle::after{content:'';flex:1;height:1px;background:rgba(240,237,232,.08)}
.cform{display:grid;gap:.75rem;margin-bottom:1.5rem}
.cform input,.cform textarea{background:var(--ink2);border:1px solid rgba(240,237,232,.1);
  color:var(--linen);padding:11px 14px;border-radius:var(--r);font-family:var(--fb);
  font-size:.875rem;transition:border-color .2s}
.cform input::placeholder,.cform textarea::placeholder{color:var(--fog)}
.cform input:focus,.cform textarea:focus{outline:none;border-color:var(--flame)}
.cform textarea{min-height:90px;resize:vertical}
.csub{padding:11px 24px;background:var(--flame);color:#fff;border:none;
  border-radius:var(--r);font-family:var(--fh);font-size:.7rem;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:background .2s;justify-self:start}
.csub:hover{background:var(--flame2)}
.clist{display:grid;gap:.75rem}
.ci{background:var(--ink2);padding:1rem 1.25rem;border-radius:var(--r);
  border-left:2px solid var(--flame);animation:cin .3s var(--ease)}
.ch{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center}
.caname{font-weight:600;color:var(--white);font-size:.9rem}
.cadate{color:var(--fog);font-size:.78rem}
.ctext{color:var(--mist);line-height:1.65;font-size:.88rem}
.cempty{color:var(--fog);font-size:.875rem;text-align:center;padding:1rem}

/* SHARE MODAL */
.smbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.smbg.open{display:flex}
.smbox{background:var(--ink3);border:1px solid rgba(240,237,232,.1);border-radius:var(--r);
  padding:2rem;max-width:380px;width:90%;position:relative;animation:min .3s var(--ease)}
.smtitle{font-family:var(--fd);font-size:1.4rem;color:var(--white);margin-bottom:1.5rem}
.smclose{position:absolute;top:14px;right:14px;width:32px;height:32px;
  background:var(--flame);color:#fff;border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.sopts{display:grid;gap:.75rem}
.sopt{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;
  border:1px solid rgba(240,237,232,.08);border-radius:var(--r);cursor:pointer;
  transition:all .2s;background:var(--ink2)}
.sopt:hover{border-color:var(--flame);transform:translateX(4px)}
.sicon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.25rem;flex-shrink:0}
.si-w{background:var(--wa);color:#fff}
.si-f{background:#1877F2;color:#fff}
.si-c{background:var(--smoke);color:var(--linen)}
.soinfo h4{color:var(--white);font-size:.9rem;margin-bottom:2px}
.soinfo p{color:var(--fog);font-size:.78rem}

/* SCROLL TOP */
.stb{position:fixed;bottom:2rem;right:2rem;width:46px;height:46px;background:var(--flame);
  color:#fff;border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;
  opacity:0;visibility:hidden;transition:all .3s;box-shadow:0 6px 24px rgba(232,73,29,.4);
  z-index:500;display:flex;align-items:center;justify-content:center}
.stb.show{opacity:1;visibility:visible}
.stb:hover{background:var(--flame2);transform:translateY(-3px)}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink3);border:1px solid rgba(232,73,29,.3);color:var(--linen);
  padding:12px 24px;border-radius:var(--r);font-size:.875rem;opacity:0;visibility:hidden;
  transition:all .3s;z-index:3000;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:900px){
  .hdr,.hero,.ctrl-bar,.fp-in,.wrap{padding-left:1.25rem;padding-right:1.25rem}
  .cgrid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
  .mcont{grid-template-columns:1fr}}
@media(max-width:600px){
  .cgrid{grid-template-columns:1fr}
  .mdetails{grid-template-columns:1fr 1fr}
  .mgallery{height:260px}
  .hnav .nbtn span{display:none}
  .fgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="hdr" id="hdr">
  <a href="index.html" class="logo"><span>DM</span> Car Agency</a>
  <div class="hnav">
    <a href="sell-car.html" class="nbtn nf"><i class="fas fa-plus"></i><span>Sell Your Car</span></a>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const DB_KEY  = 'dmcars_listings';
const ENG_KEY = 'dmcars_engagement';
const SEED_VER = 'v3';

if (localStorage.getItem('dmcars_seed_ver') !== SEED_VER) {
  localStorage.removeItem(DB_KEY);
  localStorage.setItem('dmcars_seed_ver', SEED_VER);
}

let allCars = [], engData = {}, shareCarId = null;
let curSort = 'newest', gIdx = 0, filterOn = false;

const SID = sessionStorage.getItem('sid') || (() => {
  const s = Math.random().toString(36).slice(2);
  sessionStorage.setItem('sid', s); return s;
})();

// ═══════════════════════════════════
// STORAGE
// ═══════════════════════════════════
const getCars = () => { try { return JSON.parse(localStorage.getItem(DB_KEY))||[]; } catch(e) { return []; }};
const saveCars = c => localStorage.setItem(DB_KEY, JSON.stringify(c));
const getEng  = () => { try { return JSON.parse(localStorage.getItem(ENG_KEY))||{}; } catch(e) { return {}; }};
const saveEng = e => localStorage.setItem(ENG_KEY, JSON.stringify(e));
const getCarEng = id => {
  const e = engData[id];
  return e ? {views:e.views||0,likes:e.likes||0,likedBy:e.likedBy||[],comments:e.comments||[]}
           : {views:0,likes:0,likedBy:[],comments:[]};
};

const fmt = n => Number(n).toLocaleString();
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => { const d=document.createElement('div');d.textContent=s;return d.innerHTML; };

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════
// SEED
// ═══════════════════════════════════
function seedIfEmpty() {
  if (getCars().length > 0) return;
  const s = [
    {id:uid(),make:'Toyota',model:'Fortuner',year:2021,price:75000000,mileage:45000,transmission:'Automatic',fuel:'Diesel',body_type:'SUV',color:'White',location:'Blantyre',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1614026480418-bd11fdb9fa06?w=800&q=80'],description:'One owner, full service history. Excellent condition, ready to go.',featured:true,createdAt:Date.now()-86400000*2},
    {id:uid(),make:'BMW',model:'X5',year:2020,price:120000000,mileage:32000,transmission:'Automatic',fuel:'Petrol',body_type:'SUV',color:'Black',location:'Lilongwe',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800&q=80'],description:'Panoramic sunroof, leather interior, all options. Pristine condition.',featured:true,createdAt:Date.now()-86400000*8},
    {id:uid(),make:'Honda',model:'Civic',year:2019,price:18500000,mileage:78000,transmission:'Automatic',fuel:'Petrol',body_type:'Sedan',color:'Silver',location:'Blantyre',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1606152421802-db97b9c7a11b?w=800&q=80'],description:'Fuel efficient, new tyres, full service record. Great city car.',featured:false,createdAt:Date.now()-86400000*10},
    {id:uid(),make:'Toyota',model:'Hilux',year:2022,price:65000000,mileage:25000,transmission:'Manual',fuel:'Diesel',body_type:'Truck',color:'Gray',location:'Mzuzu',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80'],description:'Double cab 4WD, bull bar, tow hook. Perfect for tough terrain.',featured:true,createdAt:Date.now()-86400000*1},
    {id:uid(),make:'Mercedes',model:'C200',year:2020,price:95000000,mileage:41000,transmission:'Automatic',fuel:'Petrol',body_type:'Sedan',color:'Navy',location:'Blantyre',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=800&q=80'],description:'Executive sedan, ambient lighting, premium audio. Low mileage.',featured:true,createdAt:Date.now()-86400000*4},
    {id:uid(),make:'Nissan',model:'Navara',year:2021,price:52000000,mileage:38000,transmission:'Automatic',fuel:'Diesel',body_type:'Truck',color:'White',location:'Zomba',phone:'265980717420',email:'info@dmcaragency.com',images:['https://images.unsplash.com/photo-1571987502951-3b1ce672d14f?w=800&q=80'],description:'Hard lid, canopy, excellent load capacity. Reliable workhorse.',featured:false,createdAt:Date.now()-86400000*6},
  ];
  saveCars(s);
}

// ═══════════════════════════════════
// SORT & FILTER
// ═══════════════════════════════════
function sortCars(cars, m) {
  const a = [...cars];
  if (m==='price_low')  return a.sort((x,y)=>x.price-y.price);
  if (m==='price_high') return a.sort((x,y)=>y.price-x.price);
  if (m==='featured')   return a.sort((x,y)=>(y.featured?1:0)-(x.featured?1:0)||y.createdAt-x.createdAt);
  if (m==='oldest')     return a.sort((x,y)=>x.createdAt-y.createdAt);
  if (m==='popular')    return a.sort((x,y)=>getCarEng(y.id).views-getCarEng(x.id).views);
  if (m==='liked')      return a.sort((x,y)=>getCarEng(y.id).likes-getCarEng(x.id).likes);
  return a.sort((x,y)=>y.createdAt-x.createdAt);
}

function applySort() { curSort = document.getElementById('sort-sel').value; renderGrid(); }

function getFiltered() {
  const q  = document.getElementById('f-q').value.toLowerCase();
  const pr = document.getElementById('f-price').value;
  const mk = document.getElementById('f-make').value.toLowerCase();
  const bt = document.getElementById('f-body').value.toLowerCase();
  const fu = document.getElementById('f-fuel').value.toLowerCase();
  const tr = document.getElementById('f-trans').value.toLowerCase();
  const yf = parseInt(document.getElementById('f-yr-f').value)||0;
  const yt = parseInt(document.getElementById('f-yr-t').value)||9999;
  return allCars.filter(c => {
    if (q && !((c.make||'').toLowerCase().includes(q)||(c.model||'').toLowerCase().includes(q)||(c.description||'').toLowerCase().includes(q))) return false;
    if (pr) { const [mn,mx]=pr.split('-').map(Number); if(c.price<mn||c.price>mx) return false; }
    if (mk && (c.make||'').toLowerCase()!==mk) return false;
    if (bt && (c.body_type||c.type||'').toLowerCase()!==bt) return false;
    if (fu && (c.fuel||c.fuel_type||'').toLowerCase()!==fu) return false;
    if (tr && (c.transmission||'').toLowerCase()!==tr) return false;
    if (c.year<yf||c.year>yt) return false;
    return true;
  });
}

function filterCars() {
  filterOn = !!(document.getElementById('f-q').value||document.getElementById('f-price').value||
    document.getElementById('f-make').value||document.getElementById('f-body').value||
    document.getElementById('f-fuel').value||document.getElementById('f-trans').value||
    document.getElementById('f-yr-f').value||document.getElementById('f-yr-t').value);
  document.getElementById('fdot').classList.toggle('show', filterOn);
  renderGrid();
}

function resetFilters() {
  ['f-q','f-price','f-make','f-body','f-fuel','f-trans','f-yr-f','f-yr-t'].forEach(id=>{
    document.getElementById(id).value='';
  });
  filterOn = false;
  document.getElementById('fdot').classList.remove('show');
  renderGrid();
}

function populateFilters() {
  const makes = [...new Set(allCars.map(c=>c.make).filter(Boolean))].sort();
  const types = [...new Set(allCars.map(c=>c.body_type||c.type||'').filter(Boolean))].sort();
  const mk = document.getElementById('f-make');
  const bt = document.getElementById('f-body');
  // Clear existing options beyond first
  while (mk.options.length > 1) mk.remove(1);
  while (bt.options.length > 1) bt.remove(1);
  makes.forEach(m => mk.appendChild(new Option(m,m)));
  types.forEach(t => bt.appendChild(new Option(t,t)));
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function renderCard(car, idx) {
  const eng  = getCarEng(car.id);
  const imgs = car.images||(car.image?[car.image]:[]);
  const mainImg = imgs[0];
  const daysOld = Math.floor((Date.now()-car.createdAt)/86400000);
  const isFeat = !!(car.featured||car.is_featured);
  const liked  = eng.likedBy.includes(SID);
  const fuel   = car.fuel||car.fuel_type||'';
  const body   = car.body_type||car.type||'';

  const imgHtml = mainImg
    ? `<img src="${mainImg}" alt="${esc(car.make+' '+car.model)}" loading="lazy"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="noimg" style="display:none"><i class="fas fa-car"></i></div>`
    : `<div class="noimg"><i class="fas fa-car"></i></div>`;

  return `<div class="ccard" id="cc-${car.id}" style="animation-delay:${idx*.05}s">
    <div class="cimg" onclick="openModal('${car.id}')">
      ${imgHtml}
      <div class="covlay"></div>
      ${imgs.length>1?`<div class="imgcnt"><i class="fas fa-images"></i> ${imgs.length}</div>`:''}
      <div class="cbadges">
        ${isFeat?'<span class="badge bfeat"><i class="fas fa-star"></i> Featured</span>':''}
        ${daysOld<=7?'<span class="badge bnew"><i class="fas fa-bolt"></i> New</span>':''}
        ${car.price<20000000?'<span class="badge bhot"><i class="fas fa-fire"></i> Hot Deal</span>':''}
      </div>
      <button class="sbtn" onclick="event.stopPropagation();openShare('${car.id}')">
        <i class="fas fa-share-alt"></i></button>
    </div>
    <div class="cbody">
      <div class="cmake">${esc(car.make)}</div>
      <div class="cname">${car.year} ${esc(car.model)}</div>
      <div class="cprice">MWK ${fmt(car.price)}</div>
      <div class="cspecs">
        <div class="spec"><i class="fas fa-road"></i>${fmt(car.mileage)} km</div>
        <div class="spec"><i class="fas fa-cog"></i>${esc(car.transmission)}</div>
        <div class="spec"><i class="fas fa-gas-pump"></i>${esc(fuel)}</div>
        <div class="spec"><i class="fas fa-car-side"></i>${esc(body)}</div>
      </div>
      ${car.description?`<p class="cdesc">${esc(car.description)}</p>`:''}
      <div class="cstats">
        <div class="spill" id="vp-${car.id}">👁️ <strong>${fmt(eng.views)}</strong> views</div>
        <div class="spill ${liked?'lkd':''}" id="lp-${car.id}">❤️ <strong>${fmt(eng.likes)}</strong> likes</div>
        <div class="spill" id="cp-${car.id}">💬 <strong>${eng.comments.length}</strong> comments</div>
      </div>
      <div class="cloc"><i class="fas fa-map-marker-alt"></i> ${esc(car.location||'Malawi')}</div>
      <div class="cacts">
        <button class="abtn ad" onclick="openModal('${car.id}')"><i class="fas fa-info-circle"></i> Details</button>
        <button class="abtn ad ${liked?'lkd':''}" id="lb-${car.id}" onclick="toggleLike('${car.id}')">
          <i class="fas fa-heart"></i> ${liked?'Liked':'Like'}</button>
        <button class="abtn aw" onclick="waContact('${car.phone||'265980717420'}','${esc(car.make+' '+car.year+' '+car.model)}')">
          <i class="fab fa-whatsapp"></i> WhatsApp</button>
      </div>
    </div>
  </div>`;
}

function renderGrid() {
  const filtered = getFiltered();
  const sorted   = sortCars(filtered, curSort);
  const grid     = document.getElementById('cgrid');
  document.getElementById('car-count').textContent = sorted.length;
  if (!sorted.length) {
    grid.innerHTML = `<div class="empty">
      <i class="fas fa-car"></i>
      <h2>${filterOn?'No vehicles match your filters':'No cars listed yet'}</h2>
      <p>${filterOn?'Try adjusting or clearing your filters.':'Be the first to list your car!'}</p>
      ${filterOn
        ?`<button class="breset" onclick="resetFilters()" style="margin-top:1rem"><i class="fas fa-undo"></i> Clear Filters</button>`
        :`<a href="sell-car.html" class="nbtn nf" style="display:inline-flex;text-decoration:none;margin-top:1rem"><i class="fas fa-plus"></i> List Your Car</a>`}
    </div>`;
    return;
  }
  grid.innerHTML = sorted.map((c,i)=>renderCard(c,i)).join('');
}

// ═══════════════════════════════════
// ENGAGEMENT
// ═══════════════════════════════════
function trackView(carId) {
  const k = `v_${carId}`;
  if (sessionStorage.getItem(k)) return;
  sessionStorage.setItem(k,'1');
  const e = getCarEng(carId); e.views++;
  engData[carId]=e; saveEng(engData);
}

function toggleLike(carId) {
  const e   = getCarEng(carId);
  const idx = e.likedBy.indexOf(SID);
  const liked = idx===-1;
  if (liked) { e.likedBy.push(SID); e.likes++; toast('❤️ Added to your likes!'); }
  else { e.likedBy.splice(idx,1); e.likes=Math.max(0,e.likes-1); toast('Like removed'); }
  engData[carId]=e; saveEng(engData);
  // update card
  const btn  = document.getElementById(`lb-${carId}`);
  const pill = document.getElementById(`lp-${carId}`);
  if (btn)  { btn.classList.toggle('lkd',liked); btn.innerHTML=`<i class="fas fa-heart"></i> ${liked?'Liked':'Like'}`; }
  if (pill) { pill.classList.toggle('lkd',liked); pill.innerHTML=`❤️ <strong>${fmt(e.likes)}</strong> likes`; }
  // update modal
  const ml = document.getElementById('modal-lc');
  const mb = document.getElementById('modal-lb');
  if (ml) ml.textContent=fmt(e.likes);
  if (mb) { mb.classList.toggle('lkd',liked); document.getElementById('modal-lt').textContent=liked?'Liked':'Like'; }
}

function waContact(phone, name) {
  const p = phone.replace(/\D/g,'');
  window.open(`https://wa.me/${p}?text=${encodeURIComponent('Hello! I\'m interested in the '+name+'. Is it still available?')}`, '_blank');
}

// ═══════════════════════════════════
// MODAL
// ═══════════════════════════════════
function openModal(carId) {
  const car = allCars.find(c=>c.id==carId);
  if (!car) return;
  trackView(carId);
  const eng  = getCarEng(carId);
  const liked = eng.likedBy.includes(SID);
  const imgs = car.images||(car.image?[car.image]:[]);
  const fuel = car.fuel||car.fuel_type||'';
  const body = car.body_type||car.type||'';
  gIdx = 0;

  // gallery
  let gHTML;
  if (imgs.length) {
    gHTML = `
      ${imgs.length>1?`<div class="gctr" id="gctr">1/${imgs.length}</div>`:''}
      ${imgs.map((s,i)=>`<img src="${s}" class="mimg ${i===0?'on':''}" alt="${esc(car.make+' '+car.model)}">`).join('')}
      ${imgs.length>1?`
        <button class="gnav prev" onclick="gNav(-1)"><i class="fas fa-chevron-left"></i></button>
        <button class="gnav next" onclick="gNav(1)"><i class="fas fa-chevron-right"></i></button>
        <div class="gdots">${imgs.map((_,i)=>`<div class="gdot ${i===0?'on':''}" onclick="gGo(${i})"></div>`).join('')}</div>`:''}`;
  } else {
    gHTML = `<div class="mnoimg"><i class="fas fa-car"></i></div>`;
  }

  document.getElementById('mcontent').innerHTML = `
    <div class="mgallery">${gHTML}</div>
    <div class="mbw">
      <div class="mmake">${esc(car.make)} · ${esc(body)}</div>
      <h2 class="mtitle">${car.year} ${esc(car.make)} ${esc(car.model)}</h2>
      <div class="mprice">MWK ${fmt(car.price)}</div>
      <div class="mstats">
        <div class="mstat">👁️ <strong id="modal-vc">${fmt(eng.views)}</strong> views</div>
        <div class="mstat">❤️ <strong id="modal-lc">${fmt(eng.likes)}</strong> likes</div>
        <div class="mstat">💬 <strong id="modal-cc">${eng.comments.length}</strong> comments</div>
      </div>
      <div class="mactrow">
        <button class="mact ma-f ${liked?'lkd':''}" id="modal-lb" onclick="toggleLike('${car.id}')">
          <i class="fas fa-heart"></i> <span id="modal-lt">${liked?'Liked':'Like'}</span></button>
        <button class="mact ma-g" onclick="document.getElementById('mcomments').scrollIntoView({behavior:'smooth'})">
          <i class="fas fa-comment"></i> Comments</button>
        <button class="mact ma-g" onclick="openShare('${car.id}')">
          <i class="fas fa-share-alt"></i> Share</button>
      </div>
      <div class="mdetails">
        <div class="drow"><i class="fas fa-calendar dicon"></i><div class="dinfo"><h4>Year</h4><p>${car.year}</p></div></div>
        <div class="drow"><i class="fas fa-road dicon"></i><div class="dinfo"><h4>Mileage</h4><p>${fmt(car.mileage)} km</p></div></div>
        <div class="drow"><i class="fas fa-cog dicon"></i><div class="dinfo"><h4>Transmission</h4><p>${esc(car.transmission)}</p></div></div>
        <div class="drow"><i class="fas fa-gas-pump dicon"></i><div class="dinfo"><h4>Fuel</h4><p>${esc(fuel)}</p></div></div>
        <div class="drow"><i class="fas fa-car-side dicon"></i><div class="dinfo"><h4>Body Type</h4><p>${esc(body)}</p></div></div>
        <div class="drow"><i class="fas fa-palette dicon"></i><div class="dinfo"><h4>Color</h4><p>${esc(car.color||'N/A')}</p></div></div>
      </div>
      ${car.description?`<div class="mdesc"><h3>Description</h3><p>${esc(car.description)}</p></div>`:''}
      <div class="mloc"><i class="fas fa-map-marker-alt"></i>
        <div><h4>Location</h4><p>${esc(car.location||'Malawi')}</p></div></div>
      <div class="mcont">
        <button class="mact ma-w" style="justify-content:center" onclick="waContact('${car.phone||'265980717420'}','${esc(car.make+' '+car.year+' '+car.model)}')">
          <i class="fab fa-whatsapp"></i> WhatsApp Seller</button>
        <button class="mact ma-g" style="justify-content:center" onclick="window.location.href='tel:+${(car.phone||'265980717420').replace(/\D/g,'')}'" >
          <i class="fas fa-phone"></i> Call Seller</button>
      </div>
      <div class="csect" id="mcomments">
        <h3 class="ctitle">Comments</h3>
        <form class="cform" onsubmit="submitComment(event,'${car.id}')">
          <input id="cn" placeholder="Your Name *" required>
          <input id="ce" type="email" placeholder="Your Email *" required>
          <input id="cp" type="tel" placeholder="Your Phone (optional)">
          <textarea id="ct" placeholder="Write a comment…" required></textarea>
          <button type="submit" class="csub" id="csub"><i class="fas fa-paper-plane"></i> Post Comment</button>
        </form>
        <div class="clist" id="clist"></div>
      </div>
    </div>`;

  renderComments(car.id);
  document.getElementById('mbg').classList.add('open');
  document.body.style.overflow='hidden';
  // update view pill in card
  const vp = document.getElementById(`vp-${car.id}`);
  if (vp) vp.innerHTML=`👁️ <strong>${fmt(eng.views)}</strong> views`;
}

function closeModal() {
  document.getElementById('mbg').classList.remove('open');
  document.body.style.overflow='';
}

function gNav(d) {
  const imgs = document.querySelectorAll('.mimg');
  const dots = document.querySelectorAll('.gdot');
  const ctr  = document.getElementById('gctr');
  if (!imgs.length) return;
  imgs[gIdx].classList.remove('on');
  if (dots[gIdx]) dots[gIdx].classList.remove('on');
  gIdx = (gIdx+d+imgs.length)%imgs.length;
  imgs[gIdx].classList.add('on');
  if (dots[gIdx]) dots[gIdx].classList.add('on');
  if (ctr) ctr.textContent=`${gIdx+1}/${imgs.length}`;
}
function gGo(i) { const d=i-gIdx; if(d>0)gNav(1); else if(d<0)gNav(-1); if(Math.abs(d)>1){gIdx=i;gNav(0);} }

// ═══════════════════════════════════
// COMMENTS
// ═══════════════════════════════════
function renderComments(carId) {
  const eng  = getCarEng(carId);
  const list = document.getElementById('clist');
  if (!list) return;
  if (!eng.comments.length) {
    list.innerHTML='<div class="cempty">No comments yet. Be the first!</div>'; return;
  }
  list.innerHTML = [...eng.comments].reverse().map(c=>`
    <div class="ci">
      <div class="ch">
        <span class="caname">${esc(c.name)}</span>
        <span class="cadate">${new Date(c.at).toLocaleDateString()}</span>
      </div>
      <p class="ctext">${esc(c.text)}</p>
    </div>`).join('');
}

function submitComment(e, carId) {
  e.preventDefault();
  const name=document.getElementById('cn').value.trim();
  const email=document.getElementById('ce').value.trim();
  const phone=document.getElementById('cp').value.trim();
  const text=document.getElementById('ct').value.trim();
  if (!name||!email||!text){toast('Please fill required fields');return;}
  const btn=document.getElementById('csub');
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Posting…'; btn.disabled=true;
  setTimeout(()=>{
    const eng=getCarEng(carId);
    eng.comments.push({name,email,phone,text,at:Date.now()});
    engData[carId]=eng; saveEng(engData);
    ['cn','ce','cp','ct'].forEach(id=>document.getElementById(id).value='');
    btn.innerHTML='<i class="fas fa-paper-plane"></i> Post Comment'; btn.disabled=false;
    renderComments(carId);
    const mc=document.getElementById('modal-cc');
    if(mc) mc.textContent=eng.comments.length;
    const cp2=document.getElementById(`cp-${carId}`);
    if(cp2) cp2.innerHTML=`💬 <strong>${eng.comments.length}</strong> comments`;
    toast('💬 Comment posted!');
  },600);
}

// ═══════════════════════════════════
// SHARE
// ═══════════════════════════════════
function openShare(carId) {
  shareCarId=carId;
  document.getElementById('smbg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeShare() {
  document.getElementById('smbg').classList.remove('open');
  document.body.style.overflow=''; shareCarId=null;
}
function getShareURL()  { return `${location.origin}${location.pathname}?carId=${shareCarId}`; }
function getShareMsg()  {
  const c=allCars.find(x=>x.id==shareCarId);
  if(!c) return getShareURL();
  return `🚗 Check out this car!\n\n${c.year} ${c.make} ${c.model}\n💰 MWK ${fmt(c.price)}\n📍 ${c.location}\n\n${getShareURL()}\n#DMCarAgency`;
}
function shareWA()  { window.open(`https://wa.me/?text=${encodeURIComponent(getShareMsg())}`,'_blank'); closeShare(); }
function shareFB()  { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(getShareURL())}`,'_blank'); closeShare(); }
function copyLink() {
  navigator.clipboard.writeText(getShareURL()).then(()=>{
    document.getElementById('copy-lbl').textContent='Copied!';
    document.getElementById('copy-icon').innerHTML='<i class="fas fa-check"></i>';
    document.getElementById('copy-icon').style.background='var(--green)';
    toast('🔗 Link copied!');
    setTimeout(()=>{
      document.getElementById('copy-lbl').textContent='Copy Link';
      document.getElementById('copy-icon').innerHTML='<i class="fas fa-link"></i>';
      document.getElementById('copy-icon').style.background='';
      closeShare();
    },1800);
  }).catch(()=>toast('Could not copy link'));
}

// ═══════════════════════════════════
// FILTER TOGGLE
// ═══════════════════════════════════
function toggleFilters() {
  const p=document.getElementById('fpanel');
  const t=document.getElementById('ftog');
  const open=p.classList.toggle('open');
  t.classList.toggle('on',open);
  document.getElementById('ftog-txt').textContent=open?'Hide Filters':'Filters';
}

// ═══════════════════════════════════
// KEYBOARD & SCROLL
// ═══════════════════════════════════
document.addEventListener('keydown', e=>{
  if (document.getElementById('mbg').classList.contains('open')) {
    if(e.key==='Escape') closeModal();
    if(e.key==='ArrowLeft')  gNav(-1);
    if(e.key==='ArrowRight') gNav(1);
  }
  if (document.getElementById('smbg').classList.contains('open') && e.key==='Escape') closeShare();
});
window.addEventListener('scroll',()=>{
  document.getElementById('stb').classList.toggle('show',window.scrollY>400);
  document.getElementById('hdr').classList.toggle('scrolled',window.scrollY>60);
});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
function init() {
  seedIfEmpty();
  allCars = getCars();
  engData = getEng();
  populateFilters();
  renderGrid();
  // handle direct ?carId link (from share)
  const cid = new URLSearchParams(location.search).get('carId');
  if (cid) setTimeout(()=>openModal(cid), 600);
  // live sync when cars added from another tab/page
  window.addEventListener('storage', e=>{
    if (e.key===DB_KEY)  { allCars=getCars(); populateFilters(); renderGrid(); }
    if (e.key===ENG_KEY) { engData=getEng(); renderGrid(); }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
