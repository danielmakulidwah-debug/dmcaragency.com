<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Login — DM Car Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0a0a0a;--ink2:#0f0f0f;--ink3:#161616;
  --border:rgba(255,255,255,.07);
  --linen:#f0ede8;--mist:#888;--fog:#555;
  --flame:#e8491d;--gold:#c8973a;--green:#27ae60;--red:#e74c3c;
  --fh:'Oswald',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--ink);color:var(--linen);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.wrap{max-width:420px;width:100%}
.logo{font-family:var(--fh);font-size:1.4rem;letter-spacing:3px;text-align:center;
  margin-bottom:.5rem;color:var(--linen)}
.logo span{color:var(--flame)}
.kicker{font-family:var(--fh);font-size:.65rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);text-align:center;margin-bottom:2rem}
.card{background:var(--ink2);border:1px solid rgba(240,237,232,.08);border-radius:4px;padding:2.25rem 2rem}
h1{font-family:var(--fh);font-size:1.6rem;letter-spacing:1px;margin-bottom:1.5rem}
label{display:block;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(240,237,232,.6);margin-bottom:.4rem;margin-top:1.1rem}
input{width:100%;background:var(--ink3);border:1px solid rgba(240,237,232,.12);
  color:var(--linen);padding:.75rem .9rem;border-radius:3px;font-size:.92rem;font-family:var(--fb)}
input:focus{outline:none;border-color:var(--flame)}
.btn{width:100%;margin-top:1.75rem;background:var(--flame);color:#fff;border:none;
  padding:.85rem;border-radius:3px;font-family:var(--fh);letter-spacing:2px;
  font-size:.85rem;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:1rem;font-size:.85rem;padding:.75rem .9rem;border-radius:3px;display:none;line-height:1.5}
.msg.err{background:rgba(232,73,29,.1);border:1px solid rgba(232,73,29,.3);color:#ff8a65;display:block;line-height:1.6;white-space:pre-line}
.msg.ok{background:rgba(120,180,90,.1);border:1px solid rgba(120,180,90,.3);color:#9bd17a;display:block}
.foot{text-align:center;margin-top:1.5rem;font-size:.85rem;color:rgba(240,237,232,.5)}
.foot a{color:var(--gold);text-decoration:none}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">DM CAR <span>AGENCY</span></div>
  <div class="kicker">Agent Network</div>
  <div class="card">
    <h1>Agent Login</h1>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password">

      <button type="submit" class="btn" id="submitBtn">Log In</button>
      <div class="msg" id="msg"></div>
    </form>

    <div id="resendWrap" style="display:none;margin-top:.75rem;text-align:center">
      <button id="resendBtn" onclick="resendConfirmation()" style="background:transparent;border:1px solid rgba(240,237,232,.15);color:rgba(240,237,232,.6);padding:.5rem 1rem;border-radius:3px;font-family:var(--fb);font-size:.8rem;cursor:pointer;transition:.2s">
        <i class="fas fa-envelope"></i> Resend Confirmation Email
      </button>
    </div>
    <div class="foot">Don't have an account? <a href="agent-signup.html">Sign up</a></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://ospebrnwdvhuituoyxlw.supabase.co';
const SUPABASE_ANON = 'sb_publishable_k7BrujJj8-zWKaLoHr1gfA_WRn_KWlQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const form = document.getElementById('loginForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submitBtn');

function showMsg(text, ok){
  msg.textContent = text;
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
}

// If already logged in, skip straight to dashboard
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    window.location.href = 'agent-dashboard.html';
  }
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const userId = data.user.id;

    // Gate 1: Email must be confirmed
    // Supabase sets email_confirmed_at once the user clicks the link
    if (!data.user.email_confirmed_at) {
      await sb.auth.signOut();
      showMsg('Please confirm your email address before logging in.\n\nCheck your inbox for a confirmation link from us. If you didn\'t receive it, use the button below to resend.', false);
      document.getElementById('resendWrap').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    // Gate 2: Mark email as confirmed in agent_profiles (idempotent)
    await sb.from('agent_profiles')
      .update({ email_confirmed: true })
      .eq('id', userId)
      .then(()=>{}, ()=>{});

    // Gate 3: Check profile status
    // Check profile status before letting them through
    const { data: profile, error: profileErr } = await sb
      .from('agent_profiles')
      .select('status, role, full_name')
      .eq('id', userId)
      .single();

    if (profileErr) throw profileErr;

    if (profile.status === 'rejected') {
      await sb.auth.signOut();
      showMsg('Your application was not approved. Please contact the agency for details.', false);
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    if (profile.status === 'pending') {
      await sb.auth.signOut();
      showMsg('Your account is still pending admin approval. Please check back soon.', false);
      btn.disabled = false;
      btn.textContent = 'Log In';
      return;
    }

    // Log the login event
    await sb.from('activity_log').insert([{
      profile_id: userId,
      action: 'login',
      detail: null
    }]).then(()=>{}, ()=>{});

    showMsg('Welcome back, ' + profile.full_name + '!', true);

    setTimeout(() => {
      if (profile.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'agent-dashboard.html';
      }
    }, 500);

  } catch (err) {
    console.error(err);
    let text = err.message || 'Login failed. Please try again.';
    if (text.toLowerCase().includes('invalid login credentials')) {
      text = 'Incorrect email or password.';
    }
    if (text.toLowerCase().includes('email not confirmed')) {
      text = 'Your email address has not been confirmed yet. Please click the link in the confirmation email we sent you.';
      document.getElementById('resendWrap').style.display = 'block';
    }
    showMsg(text, false);
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});

async function resendConfirmation() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('resendBtn');
  if (!email) {
    showMsg('Enter your email address above first, then click resend.', false);
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const { error } = await sb.auth.resend({ type: 'signup', email });
  if (error) {
    showMsg('Could not resend: ' + error.message, false);
  } else {
    showMsg('Confirmation email resent! Check your inbox (and spam folder).', true);
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-envelope"></i> Resend Confirmation Email';
}
</script>
</body>
</html>
