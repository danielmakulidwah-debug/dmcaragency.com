<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Sign Up — DM Car Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0a0a0a;--ink2:#0f0f0f;--ink3:#161616;
  --border:rgba(255,255,255,.07);
  --linen:#f0ede8;--mist:#888;--fog:#555;
  --flame:#e8491d;--gold:#c8973a;--green:#27ae60;--red:#e74c3c;
  --fh:'Oswald',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--ink);color:var(--linen);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.wrap{max-width:440px;width:100%}
.logo{font-family:var(--fh);font-size:1.4rem;letter-spacing:3px;text-align:center;
  margin-bottom:.5rem;color:var(--linen)}
.logo span{color:var(--flame)}
.kicker{font-family:var(--fh);font-size:.65rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);text-align:center;margin-bottom:2rem}
.card{background:var(--ink2);border:1px solid rgba(240,237,232,.08);border-radius:4px;padding:2.25rem 2rem}
h1{font-family:var(--fh);font-size:1.6rem;letter-spacing:1px;margin-bottom:.4rem}
.sub{font-size:.85rem;color:rgba(240,237,232,.55);margin-bottom:1.75rem;line-height:1.5}
label{display:block;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(240,237,232,.6);margin-bottom:.4rem;margin-top:1.1rem}
input{width:100%;background:var(--ink3);border:1px solid rgba(240,237,232,.12);
  color:var(--linen);padding:.75rem .9rem;border-radius:3px;font-size:.92rem;font-family:var(--fb)}
input:focus{outline:none;border-color:var(--flame)}
.btn{width:100%;margin-top:1.75rem;background:var(--flame);color:#fff;border:none;
  padding:.85rem;border-radius:3px;font-family:var(--fh);letter-spacing:2px;
  font-size:.85rem;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:1rem;font-size:.85rem;padding:.75rem .9rem;border-radius:3px;display:none;line-height:1.5}
.msg.err{background:rgba(232,73,29,.1);border:1px solid rgba(232,73,29,.3);color:#ff8a65;display:block}
.msg.ok{background:rgba(120,180,90,.1);border:1px solid rgba(120,180,90,.3);color:#9bd17a;display:block}
.foot{text-align:center;margin-top:1.5rem;font-size:.85rem;color:rgba(240,237,232,.5)}
.foot a{color:var(--gold);text-decoration:none}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">DM CAR <span>AGENCY</span></div>
  <div class="kicker">Agent Network</div>
  <div class="card">
    <h1>Create Agent Account</h1>
    <p class="sub">Sign up to list vehicles, track your sales, and earn commission. Your account will need admin approval before you can submit cars.</p>

    <form id="signupForm">
      <label for="full_name">Full Name</label>
      <input type="text" id="full_name" required autocomplete="name">

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="phone">Phone</label>
      <input type="tel" id="phone" required autocomplete="tel">

      <label for="location">Location</label>
      <input type="text" id="location" placeholder="e.g. Lilongwe">

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password">

      <label for="password2">Confirm Password</label>
      <input type="password" id="password2" required minlength="6" autocomplete="new-password">

      <button type="submit" class="btn" id="submitBtn">Create Account</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="foot">Already have an account? <a href="agent-login.html">Log in</a></div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://ospebrnwdvhuituoyxlw.supabase.co';
const SUPABASE_ANON = 'sb_publishable_k7BrujJj8-zWKaLoHr1gfA_WRn_KWlQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const form = document.getElementById('signupForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submitBtn');

function showMsg(text, ok){
  msg.textContent = text;
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg';

  const full_name = document.getElementById('full_name').value.trim();
  const email      = document.getElementById('email').value.trim();
  const phone      = document.getElementById('phone').value.trim();
  const location   = document.getElementById('location').value.trim();
  const password   = document.getElementById('password').value;
  const password2  = document.getElementById('password2').value;

  if (password !== password2) {
    showMsg('Passwords do not match.', false);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const { data: authData, error: authError } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name } }
    });

    if (authError) throw authError;
    if (!authData.user) throw new Error('Account creation did not return a user. Please try again.');

    const userId = authData.user.id;

    const { error: profileError } = await sb.from('agent_profiles').insert([{
      id: userId,
      full_name,
      email,
      phone,
      location: location || null
    }]);

    if (profileError) throw profileError;

    await sb.from('activity_log').insert([{
      profile_id: userId,
      action: 'signup',
      detail: 'Agent account created'
    }]).then(()=>{}, ()=>{});

    showMsg("Account created! Your application is pending admin approval. You'll be able to log in and submit cars once approved.", true);
    form.reset();
    btn.textContent = 'Create Account';

  } catch (err) {
    console.error(err);
    let text = err.message || 'Something went wrong. Please try again.';
    if (text.toLowerCase().includes('already registered') || text.toLowerCase().includes('already been registered')) {
      text = 'An account with this email already exists. Try logging in instead.';
    }
    showMsg(text, false);
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
