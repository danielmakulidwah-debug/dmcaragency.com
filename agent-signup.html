<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Sign Up — DM Car Agency</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#080808;color:#f0ede8;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:6px;
  padding:2rem 1.75rem;width:100%;max-width:420px}
.logo{font-family:'Oswald',sans-serif;font-size:1.2rem;letter-spacing:2px;
  margin-bottom:.3rem;text-align:center}
.logo span{color:#e8491d}
.sub{font-size:.75rem;color:#777;text-align:center;margin-bottom:2rem;letter-spacing:1px;text-transform:uppercase}
.fl{display:block;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;
  color:#777;margin-bottom:.35rem;margin-top:.9rem}
.fi{width:100%;background:#181818;border:1px solid rgba(255,255,255,.08);
  color:#f0ede8;padding:.7rem .85rem;border-radius:4px;font-size:.9rem;
  font-family:'DM Sans',sans-serif;transition:border-color .15s}
.fi:focus{outline:none;border-color:#e8491d}
.btn{width:100%;margin-top:1.5rem;background:#e8491d;color:#fff;border:none;
  padding:.82rem;border-radius:4px;font-family:'Oswald',sans-serif;letter-spacing:2px;
  font-size:.82rem;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.msg{margin-top:1rem;padding:.75rem .9rem;border-radius:4px;font-size:.84rem;
  line-height:1.55;display:none}
.msg.ok{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.25);
  color:#6fcf97;display:block}
.msg.err{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);
  color:#ff8a65;display:block}
.foot{text-align:center;margin-top:1.25rem;font-size:.82rem;color:#555}
.foot a{color:#c8973a;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">DM CAR <span>AGENCY</span></div>
  <div class="sub">Agent Sign Up</div>

  <div id="formWrap">
    <label class="fl">Full Name *</label>
    <input class="fi" type="text" id="f-name" autocomplete="name" placeholder="Your full name">

    <label class="fl">Email *</label>
    <input class="fi" type="email" id="f-email" autocomplete="email" placeholder="your@email.com">

    <label class="fl">Phone *</label>
    <input class="fi" type="tel" id="f-phone" autocomplete="tel" placeholder="+265 xxx xxx xxx">

    <label class="fl">Location</label>
    <input class="fi" type="text" id="f-location" placeholder="e.g. Blantyre">

    <label class="fl">Password *</label>
    <input class="fi" type="password" id="f-pass" autocomplete="new-password" placeholder="Minimum 6 characters">

    <label class="fl">Confirm Password *</label>
    <input class="fi" type="password" id="f-pass2" autocomplete="new-password" placeholder="Repeat password">

    <button class="btn" id="submitBtn" onclick="doSignup()">Create Account</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="debugPanel" style="display:none;margin-top:.75rem;padding:.6rem .85rem;
    background:#0d1117;border:1px solid #30363d;border-radius:4px;
    font-size:.7rem;font-family:monospace;color:#8b949e;white-space:pre-wrap;
    word-break:break-all;max-height:120px;overflow-y:auto"></div>
  <div class="foot">Already have an account? <a href="agent-login.html">Log in</a></div>
</div>

<script>
const SUPA_URL  = 'https://ospebrnwdvhuituoyxlw.supabase.co';
const SUPA_KEY  = 'sb_publishable_k7BrujJj8-zWKaLoHr1gfA_WRn_KWlQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function showMsg(text, type) {
  var el = document.getElementById('msg');
  if (typeof text !== 'string') {
    // Force-stringify any object so we never show blank {}
    try { text = JSON.stringify(text, null, 2); } 
    catch(e) { text = String(text); }
  }
  el.textContent = text || '(empty error — check browser console)';
  el.className = 'msg ' + type;
}

async function doSignup() {
  var name     = document.getElementById('f-name').value.trim();
  var email    = document.getElementById('f-email').value.trim();
  var phone    = document.getElementById('f-phone').value.trim();
  var location = document.getElementById('f-location').value.trim();
  var pass     = document.getElementById('f-pass').value;
  var pass2    = document.getElementById('f-pass2').value;
  var btn      = document.getElementById('submitBtn');

  // Basic validation
  if (!name)  { showMsg('Please enter your full name.', 'err'); return; }
  if (!email) { showMsg('Please enter your email address.', 'err'); return; }
  if (!phone) { showMsg('Please enter your phone number.', 'err'); return; }
  if (!pass)  { showMsg('Please enter a password.', 'err'); return; }
  if (pass.length < 6) { showMsg('Password must be at least 6 characters.', 'err'); return; }
  if (pass !== pass2) { showMsg('Passwords do not match.', 'err'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  document.getElementById('msg').className = 'msg';

  try {
    // Clear debug panel
    var dbg = document.getElementById('debugPanel');
    dbg.style.display = 'none'; dbg.textContent = '';

    // Step 1: Create auth account
    var authResult = await sb.auth.signUp({ email: email, password: pass });
    var authData  = authResult.data;
    var authError = authResult.error;

    if (authError) {
      // Always show a real message (never "{}")
      var errMsg =
        authError.message ||
        authError.error_description ||
        authError.msg ||
        String(authError);
      // Debug: show full raw error in console AND on screen
      console.error('AUTH ERROR FULL:', JSON.stringify(authError));
      showMsg('Auth error: ' + (errMsg || JSON.stringify(authError)), 'err');
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    var user = authData && authData.user;
    if (!user || !user.id) {
      showMsg(
        'Signup did not return a user. If this email was used before, please log in instead.',
        'err'
      );
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    // Step 2: Create profile row via RPC (bypasses RLS — needed because
    // signUp() with email confirmation ON returns no session, making
    // auth.uid() null and causing direct inserts to fail silently as {})
    var profileRes = await sb.rpc('create_agent_profile', {
      p_id:        user.id,
      p_full_name: name,
      p_email:     email,
      p_phone:     phone,
      p_location:  location || null
    });

    if (profileRes.error) {
      console.error('PROFILE RPC ERROR FULL:', JSON.stringify(profileRes.error));
      var errMsg = profileRes.error.message || profileRes.error.msg || profileRes.error.hint || '';
      if (!errMsg) { try { errMsg = JSON.stringify(profileRes.error); } catch(e) { errMsg = 'Profile setup failed.'; } }
      showMsg('Profile error: ' + errMsg, 'err');
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }

    // Step 3: Log signup activity (best-effort, don't block on failure)
    sb.from('activity_log').insert([{
      profile_id: user.id,
      action: 'signup',
      detail: 'Agent account created'
    }]).then(function(){}, function(){});

    // Step 4: Sign out so they go through login flow properly after approval
    sb.auth.signOut().then(function(){}, function(){});

    // Success — tell user to check email
    showMsg('Account created! Please check your email inbox for a confirmation link and click it to verify your address. After confirming, an admin will approve your account.', 'ok');
    btn.textContent = 'Account Created';
    // Clear form
    ['f-name','f-email','f-phone','f-location','f-pass','f-pass2'].forEach(function(id){
      document.getElementById(id).value = '';
    });

  } catch (e) {
    console.error('CAUGHT:', e);
    var dbg = document.getElementById('debugPanel');
    dbg.textContent = 'Caught: ' + JSON.stringify(e, Object.getOwnPropertyNames(e));
    dbg.style.display = 'block';
    showMsg('Unexpected error: ' + (e.message || JSON.stringify(e)), 'err');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
