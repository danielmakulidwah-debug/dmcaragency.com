<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8491d"/>
      <stop offset="100%" style="stop-color:#a83010"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a0a05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="200" height="200" rx="18" fill="none" stroke="#e8491d" stroke-width="2.5" opacity="0.35"/>

  <!-- Car silhouette — smooth sedan profile (Image 2 style) -->
  <path d="
    M 22 130
    L 22 118
    Q 22 112  28 110
    L 50 110
    L 68 88
    Q 74 80  84 78
    L 118 76
    Q 130 76  138 84
    L 158 110
    L 172 110
    Q 178 112  178 118
    L 178 130
    Z
  " fill="url(#bodyGrad)"/>

  <!-- Roof curve — smoother roofline -->
  <path d="
    M 52 110
    L 70 89
    Q 76 82  85 80
    L 118 78
    Q 128 78  136 86
    L 156 110
    Z
  " fill="#c03515"/>

  <!-- Windscreen (front) -->
  <path d="M 130 110 L 138 86 Q 132 81 120 80 L 106 80 L 106 110 Z"
    fill="rgba(255,255,255,0.09)"/>

  <!-- Rear window -->
  <path d="M 54 110 L 71 90 Q 77 83 86 81 L 104 80 L 104 110 Z"
    fill="rgba(255,255,255,0.07)"/>

  <!-- Headlight glow -->
  <ellipse cx="168" cy="116" rx="6" ry="4" fill="#c8973a" opacity="0.95" filter="url(#glow)"/>
  <ellipse cx="168" cy="116" rx="3.5" ry="2.2" fill="#ffe090"/>

  <!-- Taillight -->
  <rect x="21" y="112" width="5" height="8" rx="2" fill="#ff3300" opacity="0.9"/>

  <!-- Door line detail -->
  <line x1="100" y1="78" x2="100" y2="110" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>

  <!-- Front wheel -->
  <circle cx="62" cy="130" r="20" fill="#0f0f0f" stroke="#e8491d" stroke-width="3"/>
  <circle cx="62" cy="130" r="12" fill="#1a0805" stroke="#c8973a" stroke-width="1.5"/>
  <circle cx="62" cy="130" r="4" fill="#c8973a"/>
  <!-- Wheel spokes -->
  <line x1="62" y1="118" x2="62" y2="122" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="62" y1="138" x2="62" y2="142" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="50" y1="130" x2="54" y2="130" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="70" y1="130" x2="74" y2="130" stroke="#c8973a" stroke-width="1.5"/>

  <!-- Rear wheel -->
  <circle cx="138" cy="130" r="20" fill="#0f0f0f" stroke="#e8491d" stroke-width="3"/>
  <circle cx="138" cy="130" r="12" fill="#1a0805" stroke="#c8973a" stroke-width="1.5"/>
  <circle cx="138" cy="130" r="4" fill="#c8973a"/>
  <!-- Wheel spokes -->
  <line x1="138" y1="118" x2="138" y2="122" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="138" y1="138" x2="138" y2="142" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="126" y1="130" x2="130" y2="130" stroke="#c8973a" stroke-width="1.5"/>
  <line x1="146" y1="130" x2="150" y2="130" stroke="#c8973a" stroke-width="1.5"/>

  <!-- DM text inside car body -->
  <text x="100" y="108"
    font-family="'Arial Black',Oswald,Arial,sans-serif"
    font-size="26" font-weight="900"
    fill="#c8973a"
    text-anchor="middle"
    letter-spacing="3"
    filter="url(#glow)">DM</text>

  <!-- CAR AGENCY text below -->
  <text x="100" y="168"
    font-family="Arial,sans-serif"
    font-size="13" font-weight="700"
    fill="#c8973a"
    text-anchor="middle"
    letter-spacing="5">CAR AGENCY</text>

  <!-- Underline for CAR AGENCY -->
  <line x1="44" y1="172" x2="156" y2="172" stroke="#e8491d" stroke-width="1" opacity="0.5"/>
</svg>